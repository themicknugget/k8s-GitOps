controlPlane:
  inlinePatch:
    cluster:
      allowSchedulingOnMasters: true
      etcd:
        extraArgs:
          listen-metrics-urls: http://0.0.0.0:2381
      controllerManager:
        extraArgs:
          bind-address: 0.0.0.0
      scheduler:
        extraArgs:
          bind-address: 0.0.0.0
      apiServer:
        disablePodSecurityPolicy: true
        admissionControl:
          - name: PodSecurity
            configuration:
              apiVersion: pod-security.admission.config.k8s.io/v1alpha1
              defaults:
                audit: restricted
                audit-version: latest
                enforce: baseline
                enforce-version: latest
                warn: restricted
                warn-version: latest
              exemptions:
                namespaces:
                  - kube-system
                runtimeClasses: []
                usernames: []
              kind: PodSecurityConfiguration
        auditPolicy:
          apiVersion: audit.k8s.io/v1
          kind: Policy
          rules:
            - level: Metadata
      discovery:
        registries:
          service:
            disabled: true
      coreDNS:
        disabled: true
      extraManifests:
        - https://github.com/themicknugget/k8s-GitOps/raw/main/talos/integrations/cert-approver.yaml
        - https://github.com/themicknugget/k8s-GitOps/raw/main/talos/integrations/coredns.yaml
    machine: &machine
      registries:
        mirrors:
          docker.io:
            endpoints:
              - https://registry-docker.${SECRET_REGISTRY}
          gcr.io:
            endpoints:
              - https://registry-gcr.${SECRET_REGISTRY}
          ghcr.io:
            endpoints:
              - https://registry-ghcr.${SECRET_REGISTRY}
          registry.k8s.io:
            endpoints:
              - https://registry-k8s.${SECRET_REGISTRY}
      install:
        image: ghcr.io/siderolabs/installer:v1.3.7
        extensions:
          - image: ghcr.io/siderolabs/drbd:9.2.0-v1.3.7
        extraKernelArgs:
          - talos.logging.kernel=udp://192.168.1.62:6001/
      logging:
        destinations:
          - endpoint: udp://192.168.1.62:6002/
            format: json_lines
      kernel:
        modules:
          - name: drbd
            parameters:
              - usermode_helper=disabled
          - name: drbd_transport_tcp
      sysfs:
        devices.system.cpu.intel_pstate.no_turbo: 1
        devices.system.cpu.cpu0.cpufreq.scaling_governor: performance
      sysctls:
        fs.inotify.max_user_watches: 1048576
        fs.inotify.max_user_instances: 8192
        kernel.randomize_va_space: 0
        net.core.netdev_max_backlog: 25000
        net.core.rmem_max: 4136960
        net.core.wmem_max: 4136960
        net.ipv4.tcp_congestion_control: cubic
        net.ipv4.tcp_fin_timeout: 1
        net.ipv4.tcp_limit_output_bytes: 131072
        net.ipv4.tcp_low_latency: 0
        net.ipv4.tcp_max_tw_buckets: 450000
        net.ipv4.tcp_rmem: 4096 87380 4136960
        net.ipv4.tcp_wmem: 4096 87380 4136960
        net.ipv4.tcp_tw_reuse: 1
      network:
        extraHostEntries:
          - ip: ${clusterEndpointIP}
            aliases:
              - k8s.${domainName}
          - ip: ${gatewayIP}
            aliases:
              - nas.${domainName}
      time:
        disabled: false
        servers:
          - pool.ntp.org
      kubelet:
        defaultRuntimeSeccompProfileEnabled: true
        disableManifestsDirectory: true
        extraArgs:
          feature-gates: GracefulNodeShutdown=true
          rotate-server-certificates: true
      features:
        rbac: true
        stableHostname: true
        apidCheckExtKeyUsage: true
      files:
        - content: |
            [plugins."io.containerd.grpc.v1.cri"]
              enable_unprivileged_ports = true
              enable_unprivileged_icmp = true
          path: /etc/cri/conf.d/20-customization.part
          op: create
worker:
  inlinePatch:
    machine:
      !!merge <<: *machine
