  - hostname: elite1.k8s.${domainName}
    ipAddress: 192.168.1.51
    installDiskSelector:
      serial: 23052C802518
    controlPlane: true
    nameservers:
      - ${gatewayIP}
    networkInterfaces:
      - interface: bond0
        bond:
          interfaces:
            - eth0
            - eth1
          # deviceSelectors:
          #   - hardwareAddr: 10:e7:c6:04:4a:25
          #   - hardwareAddr: 1c:fd:08:7a:98:64
          mode: balance-alb
        addresses:
          - 192.168.1.51/24
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: ${gatewayIP}
        vip:
          ip: ${clusterEndpointIP}
    nodeLabels: &masterLabels
      topology.kubernetes.io/region: *cluster
      topology.kubernetes.io/zone: m
      linbit.com/storagenode: "true"
    patches: &intelextensions
      - |-
        machine:
          install:
            extensions:
              - image: ghcr.io/siderolabs/i915-ucode:20230404
